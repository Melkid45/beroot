<link rel="stylesheet" href="./cities.scss">
<section class="block block--pb cities-block">
    <div class="container--wide">
        <div class="cities">
            <div class="cities__head">
                <div class="head__text">
                    <div class="tag text text--small text--color-accent">
                        <i data-lucide="map-pin"></i>
                        Города проекта
                    </div>
                    <h2 class="heading heading--large heading--color-black">
                        Куда отправиться гулять?
                    </h2>
                </div>
                <div class="head__search">
                    <i data-lucide="search"></i>
                    <input class="text text--medium text--color-black" type="text" name="search" placeholder="Найти город или район…">
                </div>
            </div>
            <div class="cities__content">
                <a href="" class="cities__item cities__item-two">
                    <div class="tag tag__white text text--small text--color-accent">
                        24 маршрута
                    </div>
                    <h3 class="heading heading--medium heading--color-white heading--medi">Санкт-Петербург</h3>
                    <img src="@/assets/_images/city/1.png" alt="">
                </a>
                <a href="" class="cities__item">
                    <div class="tag tag__white text text--small text--color-accent">
                        12 маршрутов
                    </div>
                    <h3 class="heading heading--medium heading--color-white heading--medi">Москва</h3>
                    <img src="@/assets/_images/city/2.png" alt="">
                </a>
                <a href="" class="cities__item">
                    <div class="tag tag__white text text--small text--color-accent">
                        4 маршрута
                    </div>
                    <h3 class="heading heading--medium heading--color-white heading--medi">Калининград</h3>
                    <img src="@/assets/_images/city/3.png" alt="">
                </a>
                <a href="" class="cities__item">
                    <div class="tag tag__white text text--small text--color-accent">
                        7 маршрутов
                    </div>
                    <h3 class="heading heading--medium heading--color-white heading--medi">Казань</h3>
                    <img src="@/assets/_images/city/4.png" alt="">
                </a>
            </div>
        </div>
    </div>
</section>
