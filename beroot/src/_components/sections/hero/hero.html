<link rel="stylesheet" href="./hero.scss">

<section class="block block--hero">
  <div class="hero">
    <div class="hero__content">
      <div class="hero__content-text">
        <div class="tag text text--small text--color-accent">
          <i data-lucide="map-pin"></i>
          Уже 47 маршрутов в 4 городах
        </div>
        <div class="hero__content-main">
          <h1 class="heading heading--giant heading--color-black">
            Пешком по городу <br>
            <span>с умным гидом</span><span class="hero__title-tail"> в кармане</span>
          </h1>
          <p class="text text--large text--color-grey">
            Тематические маршруты, аудиоэкскурсии и подборки <br>
            необычных мест — всё в одном приложении. <br>
            Слушай истории улиц и открывай города по-новому.
          </p>
        </div>
      </div>
      <div class="hero__content-action">
        <div class="action__buttons">
          <a href="">
            <img src="@/assets/_images/hero/appstore.svg" alt="">
          </a>
          <a href="">
            <img src="@/assets/_images/hero/googleplay.svg" alt="">
          </a>
        </div>
        <div class="hero__qr">
          <span class="text text--small text--color-grey">
            Навести камеру <br>
            и скачать
          </span>
          <img src="@/assets/_images/hero/hero_qr.png" alt="">
        </div>
      </div>
    </div>
    <img class="hero__image" src="@/assets/_images/hero.png" alt="Экран приложения BeetRoute с маршрутом по городу">
  </div>
</section>
