<link rel="stylesheet" href="./maps.scss">


<section class="block block--y">
    <div class="container">
        <div class="maps">
            <div class="maps__head">
                <div class="tag text text--small text--color-accent">
                    Карта города
                </div>
                <h2 class="heading heading--large heading--color-black">
                    Места на карте Петербурга
                </h2>
            </div>
            <div class="maps__frame">
                <div class="maps__content">
                    <div class="maps__wrapper">
                        <img class="maps__content-img" src="@/assets/_images/map.png" alt="">
                    </div>
                    <div class="maps__layout">
                        <div class="maps__layout-text">
                            <h3 class="text text--giant text--color-black">
                                Разблокируйте <br>
                                все функции
                            </h3>
                            <p class="text text--medium text--color-grey">
                                Полная навигация по ходу прогулки
                                и встроенные аудиогиды работают только внутри приложения BeetRoute.
                            </p>
                        </div>
                        <div class="maps__layout-action">
                            <div class="maps__buttons">
                                <a href="">
                                    <img src="@/assets/_images/hero/appstore.svg" alt="">
                                </a>
                                <a href="">
                                    <img src="@/assets/_images/hero/googleplay.svg" alt="">
                                </a>
                            </div>
                            <div class="maps__qr">
                                <span class="text text--small text--color-grey">
                                    Навести камеру <br>
                                    и скачать
                                </span>
                                <img src="@/assets/_images/hero/hero_qr.png" alt="">
                            </div>
                        </div>
                    </div>
                </div>
                <p class="text text--medium text--color-accent">
                    <i data-lucide="info"></i>
                    Нажмите на метку, чтобы узнать подробности — полная навигация доступна в приложении
                </p>
            </div>
        </div>
    </div>
</section>
