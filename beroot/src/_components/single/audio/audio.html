<link rel="stylesheet" href="./audio.scss">

<div class="person__audio"
    data-audio-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    data-audio-duration="30" data-audio-bars="64">
    <button class="button button--blue button--rounded-full" type="button"
        aria-label="Воспроизвести аудиопревью">
        <i data-lucide="play"></i>

    <div class="person__audio-timeline">

    </div>
